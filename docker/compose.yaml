services:
  semantic-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: semantic-core
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ../.ai-native:/app/.ai-native

  validator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: validator
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3002
    ports:
      - "3002:3002"
    volumes:
      - ../.ai-native:/app/.ai-native

  compiler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: compiler
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3003
    ports:
      - "3003:3003"
    volumes:
      - ../.ai-native:/app/.ai-native

  java-parser:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: java-parser
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3004
    ports:
      - "3004:3004"
    volumes:
      - ../.ai-native:/app/.ai-native

  jqassistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: jqassistant
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3005
    ports:
      - "3005:3005"
    volumes:
      - ../.ai-native:/app/.ai-native

  deterministic-graph:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: deterministic-graph
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3006
    ports:
      - "3006:3006"
    volumes:
      - ../.ai-native:/app/.ai-native

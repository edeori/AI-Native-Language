services:
  semantic-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: semantic-core
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3001
    restart: unless-stopped
    ports:
      - "3001:3001"

  validator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: validator
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3002
    restart: unless-stopped
    ports:
      - "3002:3002"

  compiler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: compiler
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3003
    restart: unless-stopped
    ports:
      - "3003:3003"

  java-parser:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: java-parser
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3004
    restart: unless-stopped
    ports:
      - "3004:3004"

  jqassistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: jqassistant
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3005
    restart: unless-stopped
    ports:
      - "3005:3005"

  document-import:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
      args:
        SERVICE: document-import
    environment:
      MCP_TRANSPORT_MODE: http
      MCP_PATH: /mcp
      PORT: 3007
    restart: unless-stopped
    ports:
      - "3007:3007"
